<form hx-post="{% url 'post:toggle_like' post.pk %}" hx-target="this" hx-swap="outerHTML">
    {% csrf_token %}
    <button type="submit"
        style="display:flex; align-items:center; gap:5px; font-size:13px; color:var(--muted); background:none; border:none; cursor:pointer; font-family:'Sora',sans-serif; padding:0; transition:color 0.15s;"
        onmouseover="this.style.color='#ef4444'" onmouseout="this.style.color='var(--muted)'">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path
                d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" />
        </svg>
        {{ post.count_likes }} <span data-i18n="post.likes_word">лайков</span>
    </button>
</form>
