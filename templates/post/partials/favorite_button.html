<form hx-post="{% url 'post:toggle_favorite' post.pk %}" hx-target="this" hx-swap="outerHTML"
    style="margin:0; margin-left:auto;">
    {% csrf_token %}
    <button type="submit"
        style="display:flex; align-items:center; gap:6px; font-size:13px; color:var(--muted); background:none; border:none; cursor:pointer; font-family:'Sora',sans-serif; padding:0; transition:color 0.15s;"
        onmouseover="this.style.color='#f59e0b'" onmouseout="this.style.color='var(--muted)'">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z" />
        </svg>
        <span data-i18n="post.save_bookmark">Сохранить</span>
    </button>
</form>
